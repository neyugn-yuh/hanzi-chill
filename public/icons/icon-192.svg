<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Book shadow -->
  <rect x="48" y="42" width="96" height="108" rx="8" fill="rgba(0,0,0,0.15)"/>
  <!-- Book body -->
  <rect x="44" y="38" width="96" height="108" rx="8" fill="url(#book)"/>
  <!-- Book spine -->
  <rect x="44" y="38" width="12" height="108" rx="4" fill="#e5e5e5"/>
  <!-- Chinese character 汉 -->
  <text x="92" y="110" font-family="serif" font-size="58" font-weight="700" fill="#dc2626" text-anchor="middle" dominant-baseline="middle">汉</text>
  <!-- Bottom accent line -->
  <rect x="56" y="130" width="80" height="3" rx="1.5" fill="#ef4444" opacity="0.5"/>
</svg>
